<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system,'Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="devGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Motor Development Milestones · 4–18세</text>
  <text x="40" y="60" fill="#64748b" font-size="12">기초운동기 → 전문운동기 단계별 백분위 진척 · LifespanMove 아동 트랙 (Phase 1A·2B)</text>

  <!-- 3 phases band -->
  <g transform="translate(80 100)">
    <rect x="0" y="0" width="220" height="40" fill="#a78bfa" fill-opacity="0.18" stroke="#a78bfa" stroke-width="1" rx="4"/>
    <text x="110" y="18" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="600">기초운동기 (Fundamental)</text>
    <text x="110" y="32" fill="#c4b5fd" font-size="9" text-anchor="middle">4–7세 · 이동·조작·균형 기본형</text>

    <rect x="225" y="0" width="220" height="40" fill="#22d3ee" fill-opacity="0.18" stroke="#22d3ee" stroke-width="1" rx="4"/>
    <text x="335" y="18" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="600">과도기 (Transition)</text>
    <text x="335" y="32" fill="#67e8f9" font-size="9" text-anchor="middle">8–12세 · 협응·정밀화·조합</text>

    <rect x="450" y="0" width="220" height="40" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="1" rx="4"/>
    <text x="560" y="18" fill="#34d399" font-size="11" text-anchor="middle" font-weight="600">전문운동기 (Specialized)</text>
    <text x="560" y="32" fill="#6ee7b7" font-size="9" text-anchor="middle">13–18세 · 종목·전략·체력 결합</text>
  </g>

  <!-- Trajectory plot -->
  <line x1="80" y1="380" x2="750" y2="380" stroke="#334155"/>
  <line x1="80" y1="170" x2="80" y2="380" stroke="#334155"/>

  <g fill="#64748b" font-size="10" text-anchor="end">
    <text x="72" y="384">0</text>
    <text x="72" y="328">25</text>
    <text x="72" y="276">50</text>
    <text x="72" y="222">75</text>
    <text x="72" y="172">100</text>
  </g>
  <text x="36" y="280" fill="#94a3b8" font-size="11" transform="rotate(-90 36 280)" text-anchor="middle">발달 점수 (백분위)</text>

  <g fill="#64748b" font-size="10" text-anchor="middle">
    <text x="120" y="400">4</text>
    <text x="200" y="400">7</text>
    <text x="290" y="400">10</text>
    <text x="400" y="400">12</text>
    <text x="520" y="400">15</text>
    <text x="700" y="400">18</text>
  </g>
  <text x="400" y="425" fill="#94a3b8" font-size="11" text-anchor="middle">연령 (세)</text>

  <!-- Phase backgrounds extended -->
  <rect x="80" y="170" width="220" height="210" fill="#a78bfa" fill-opacity="0.04"/>
  <rect x="300" y="170" width="220" height="210" fill="#22d3ee" fill-opacity="0.04"/>
  <rect x="520" y="170" width="230" height="210" fill="#34d399" fill-opacity="0.04"/>

  <!-- 25-75 ribbon (general 전체 발달) -->
  <path d="M 120 320 Q 200 270, 290 235 Q 400 215, 520 200 Q 620 195, 700 190
           L 700 240 Q 620 245, 520 250 Q 400 265, 290 290 Q 200 325, 120 360 Z"
        fill="url(#devGrad)"/>

  <!-- Reference median -->
  <path d="M 120 340 Q 200 295, 290 260 Q 400 230, 520 215 Q 620 205, 700 200"
        fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.7"/>

  <!-- Scatter dots (synthetic n~120 children) -->
  <g opacity="0.55">
    <circle cx="130" cy="335" r="2.5" fill="#a78bfa"/>
    <circle cx="155" cy="318" r="2.5" fill="#a78bfa"/>
    <circle cx="180" cy="295" r="2.5" fill="#a78bfa"/>
    <circle cx="210" cy="280" r="2.5" fill="#a78bfa"/>
    <circle cx="235" cy="278" r="2.5" fill="#a78bfa"/>
    <circle cx="265" cy="265" r="2.5" fill="#22d3ee"/>
    <circle cx="295" cy="255" r="2.5" fill="#22d3ee"/>
    <circle cx="325" cy="248" r="2.5" fill="#22d3ee"/>
    <circle cx="358" cy="235" r="2.5" fill="#22d3ee"/>
    <circle cx="395" cy="228" r="2.5" fill="#22d3ee"/>
    <circle cx="430" cy="222" r="2.5" fill="#22d3ee"/>
    <circle cx="465" cy="215" r="2.5" fill="#22d3ee"/>
    <circle cx="500" cy="210" r="2.5" fill="#22d3ee"/>
    <circle cx="540" cy="208" r="2.5" fill="#34d399"/>
    <circle cx="580" cy="205" r="2.5" fill="#34d399"/>
    <circle cx="620" cy="200" r="2.5" fill="#34d399"/>
    <circle cx="660" cy="198" r="2.5" fill="#34d399"/>
    <circle cx="695" cy="195" r="2.5" fill="#34d399"/>
  </g>

  <!-- 본인 학생 점 (9세, 65백분위 — 과도기 상단) -->
  <g>
    <line x1="262" y1="252" x2="262" y2="380" stroke="#fbbf24" stroke-dasharray="2 2" opacity="0.5"/>
    <circle cx="262" cy="252" r="6" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
    <g transform="translate(280 220)">
      <rect width="148" height="40" fill="#0f172a" stroke="#fbbf24" rx="4"/>
      <text x="10" y="16" fill="#fbbf24" font-size="11" font-weight="600">우리 아이 · 9세</text>
      <text x="10" y="30" fill="#fde68a" font-size="10">통합 65%ile (과도기 상위)</text>
    </g>
  </g>

  <!-- Phase milestone tags -->
  <g font-size="9" fill="#94a3b8">
    <text x="120" y="355">▲ 한발서기 3s</text>
    <text x="200" y="345">▲ 잡기/던지기 형태</text>
    <text x="300" y="270">▲ 협응·리듬</text>
    <text x="430" y="245">▲ 양손·교차</text>
    <text x="540" y="220">▲ 종목 특이성</text>
    <text x="640" y="205">▲ 전략·결정</text>
  </g>
</svg>
