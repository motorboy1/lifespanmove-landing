<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system,'Malgun Gothic',sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Skill Development Pathway · 도장 8주 프로그램</text>
  <text x="40" y="60" fill="#64748b" font-size="12">측정 결과 → 약점 영역 → 도장 운영 자동 처방 + 주차별 milestone (관장용)</text>

  <!-- Weakness detection -->
  <g transform="translate(40 90)">
    <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="600">측정 → 약점 detection</text>
    <line x1="0" y1="6" x2="200" y2="6" stroke="#fbbf24"/>

    <g transform="translate(0 20)">
      <text x="0" y="14" fill="#94a3b8" font-size="10">균형 (M3)</text>
      <rect x="0" y="20" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="20" width="81" height="8" fill="#fbbf24" rx="2"/>
      <text x="170" y="40" fill="#fbbf24" font-size="9" text-anchor="end">45 (focus)</text>

      <text x="0" y="62" fill="#94a3b8" font-size="10">착지 안정</text>
      <rect x="0" y="68" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="68" width="68" height="8" fill="#fbbf24" rx="2"/>
      <text x="170" y="88" fill="#fbbf24" font-size="9" text-anchor="end">38 (focus)</text>

      <text x="0" y="110" fill="#94a3b8" font-size="10">CMJ depth</text>
      <rect x="0" y="116" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="116" width="63" height="8" fill="#fbbf24" rx="2"/>
      <text x="170" y="136" fill="#fbbf24" font-size="9" text-anchor="end">35 (focus)</text>

      <text x="0" y="158" fill="#94a3b8" font-size="10">좌·우 비대칭</text>
      <rect x="0" y="164" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="164" width="155" height="8" fill="#ef4444" rx="2"/>
      <text x="170" y="184" fill="#ef4444" font-size="9" text-anchor="end">10.3% ↑</text>
    </g>
  </g>

  <!-- 8-week roadmap -->
  <g transform="translate(280 90)">
    <text x="0" y="0" fill="#22d3ee" font-size="11" font-weight="600">8주 주차별 milestone (도장 운영)</text>
    <line x1="0" y1="6" x2="280" y2="6" stroke="#22d3ee"/>

    <!-- Week boxes -->
    <g transform="translate(0 20)">
      <g>
        <rect width="60" height="36" fill="#0f172a" stroke="#1e293b" rx="3"/>
        <text x="30" y="14" fill="#94a3b8" font-size="9" text-anchor="middle">W1–2</text>
        <text x="30" y="28" fill="#a78bfa" font-size="9" text-anchor="middle">베이스</text>
      </g>
      <g transform="translate(64 0)">
        <rect width="60" height="36" fill="#0f172a" stroke="#1e293b" rx="3"/>
        <text x="30" y="14" fill="#94a3b8" font-size="9" text-anchor="middle">W3–4</text>
        <text x="30" y="28" fill="#22d3ee" font-size="9" text-anchor="middle">균형 강화</text>
      </g>
      <g transform="translate(128 0)">
        <rect width="60" height="36" fill="#0f172a" stroke="#1e293b" rx="3"/>
        <text x="30" y="14" fill="#94a3b8" font-size="9" text-anchor="middle">W5–6</text>
        <text x="30" y="28" fill="#34d399" font-size="9" text-anchor="middle">파워 정밀</text>
      </g>
      <g transform="translate(192 0)">
        <rect width="60" height="36" fill="#0f172a" stroke="#1e293b" rx="3"/>
        <text x="30" y="14" fill="#94a3b8" font-size="9" text-anchor="middle">W7–8</text>
        <text x="30" y="28" fill="#fbbf24" font-size="9" text-anchor="middle">통합·재평가</text>
      </g>
    </g>

    <!-- Drill list per period -->
    <g transform="translate(0 70)" font-size="9">
      <text x="0" y="0" fill="#a78bfa" font-weight="600">W1–2 베이스</text>
      <text x="0" y="14" fill="#94a3b8">· 발구르기 리듬</text>
      <text x="0" y="28" fill="#94a3b8">· 양발 박스 점프</text>
      <text x="0" y="42" fill="#94a3b8">· 외발 정지 5s</text>

      <text x="100" y="0" fill="#22d3ee" font-weight="600">W3–4 균형</text>
      <text x="100" y="14" fill="#94a3b8">· 짐볼 한발</text>
      <text x="100" y="28" fill="#94a3b8">· 평균대 진행</text>
      <text x="100" y="42" fill="#94a3b8">· 눈감기 5s</text>

      <text x="200" y="0" fill="#34d399" font-weight="600">W5–6 파워</text>
      <text x="200" y="14" fill="#94a3b8">· 깊은 CMJ</text>
      <text x="200" y="28" fill="#94a3b8">· 좌→우 측면</text>
      <text x="200" y="42" fill="#94a3b8">· 박스 깊이↑</text>

      <text x="300" y="0" fill="#fbbf24" font-weight="600">W7–8 통합</text>
      <text x="300" y="14" fill="#94a3b8">· 점프-착지-회전</text>
      <text x="300" y="28" fill="#94a3b8">· 콤보 시퀀스</text>
      <text x="300" y="42" fill="#94a3b8">· 재측정 ✓</text>
    </g>
  </g>

  <!-- Per-session structure -->
  <g transform="translate(40 290)">
    <rect width="370" height="170" fill="#0f172a" stroke="#22d3ee" rx="6"/>
    <text x="14" y="22" fill="#22d3ee" font-size="11" font-weight="600">1회 50분 세션 구성</text>
    <line x1="14" y1="32" x2="356" y2="32" stroke="#334155"/>

    <g font-size="10">
      <text x="20" y="52" fill="#94a3b8">Warm-up</text>
      <rect x="120" y="44" width="40" height="10" fill="#a78bfa" opacity="0.5" rx="2"/>
      <text x="320" y="52" fill="#cbd5e1" text-anchor="end">10분 · 동적 스트레칭</text>

      <text x="20" y="74" fill="#94a3b8">Skill drill</text>
      <rect x="120" y="66" width="80" height="10" fill="#22d3ee" opacity="0.55" rx="2"/>
      <text x="320" y="74" fill="#cbd5e1" text-anchor="end">20분 · 주차별 drill (위)</text>

      <text x="20" y="96" fill="#94a3b8">Game / 경기</text>
      <rect x="120" y="88" width="60" height="10" fill="#34d399" opacity="0.55" rx="2"/>
      <text x="320" y="96" fill="#cbd5e1" text-anchor="end">15분 · 적용·재미</text>

      <text x="20" y="118" fill="#94a3b8">Cool-down</text>
      <rect x="120" y="110" width="20" height="10" fill="#94a3b8" opacity="0.5" rx="2"/>
      <text x="320" y="118" fill="#cbd5e1" text-anchor="end">5분 · 정적 스트레칭</text>

      <text x="20" y="148" fill="#fbbf24" font-size="10" font-weight="600">★ 측정: W4, W8 (8분/회)</text>
    </g>
  </g>

  <!-- Goal -->
  <g transform="translate(430 290)">
    <rect width="330" height="170" fill="#0f172a" stroke="#fbbf24" rx="6"/>
    <text x="14" y="22" fill="#fbbf24" font-size="11" font-weight="600">8주 목표</text>
    <line x1="14" y1="32" x2="316" y2="32" stroke="#334155"/>

    <g font-size="10">
      <text x="14" y="54" fill="#94a3b8">M3 균형 백분위</text>
      <text x="316" y="54" fill="#10b981" text-anchor="end" font-weight="600">45 → 60 ↑</text>

      <text x="14" y="76" fill="#94a3b8">착지 안정 (sway area)</text>
      <text x="316" y="76" fill="#10b981" text-anchor="end" font-weight="600">95 → 70 mm²</text>

      <text x="14" y="98" fill="#94a3b8">CMJ depth</text>
      <text x="316" y="98" fill="#10b981" text-anchor="end" font-weight="600">18 → 22 cm</text>

      <text x="14" y="120" fill="#94a3b8">좌·우 비대칭 SI</text>
      <text x="316" y="120" fill="#10b981" text-anchor="end" font-weight="600">10.3% → &lt;7%</text>

      <line x1="14" y1="130" x2="316" y2="130" stroke="#334155"/>
      <text x="14" y="150" fill="#cbd5e1" font-size="10" font-weight="600">예상 Motor IQ:</text>
      <text x="316" y="150" fill="#fbbf24" font-size="11" text-anchor="end" font-weight="600">58 → 65</text>
    </g>
  </g>
</svg>
