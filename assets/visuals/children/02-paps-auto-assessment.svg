<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,'Malgun Gothic',sans-serif">
  <rect width="800" height="520" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">PAPS-Aligned Auto-Assessment</text>
  <text x="40" y="60" fill="#64748b" font-size="12">학생건강체력평가 (PAPS) 5체력 매핑 · LifespanMove IMU 자동 측정 · 학교/도장</text>

  <!-- 5 체력 카드 -->
  <g transform="translate(40 90)">
    <text x="0" y="0" fill="#a78bfa" font-size="11" font-weight="600">5 체력 영역 · 자동 매핑</text>
    <line x1="0" y1="6" x2="200" y2="6" stroke="#a78bfa"/>
  </g>

  <!-- Card 1: 심폐지구력 -->
  <g transform="translate(40 110)">
    <rect width="140" height="120" fill="#0f172a" stroke="#22d3ee" rx="6"/>
    <text x="70" y="22" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="600">심폐지구력</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#334155"/>
    <text x="10" y="50" fill="#94a3b8" font-size="10">PAPS 종목</text>
    <text x="10" y="66" fill="#f1f5f9" font-size="10">왕복오래달리기</text>
    <text x="10" y="84" fill="#94a3b8" font-size="10">M-측정 매핑</text>
    <text x="10" y="100" fill="#22d3ee" font-size="11" font-weight="600">M2 (20m 왕복)</text>
    <text x="10" y="115" fill="#64748b" font-size="9">가속도 RMS · 속도 추정</text>
  </g>

  <!-- Card 2: 근력·근지구력 -->
  <g transform="translate(190 110)">
    <rect width="140" height="120" fill="#0f172a" stroke="#f97316" rx="6"/>
    <text x="70" y="22" fill="#f97316" font-size="11" text-anchor="middle" font-weight="600">근력·근지구력</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#334155"/>
    <text x="10" y="50" fill="#94a3b8" font-size="10">PAPS 종목</text>
    <text x="10" y="66" fill="#f1f5f9" font-size="10">악력·윗몸</text>
    <text x="10" y="84" fill="#94a3b8" font-size="10">M-측정 매핑</text>
    <text x="10" y="100" fill="#f97316" font-size="11" font-weight="600">M4 점프 + M-grip</text>
    <text x="10" y="115" fill="#64748b" font-size="9">peak power · symmetry</text>
  </g>

  <!-- Card 3: 유연성 -->
  <g transform="translate(340 110)">
    <rect width="140" height="120" fill="#0f172a" stroke="#94a3b8" rx="6"/>
    <text x="70" y="22" fill="#94a3b8" font-size="11" text-anchor="middle" font-weight="600">유연성</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#334155"/>
    <text x="10" y="50" fill="#94a3b8" font-size="10">PAPS 종목</text>
    <text x="10" y="66" fill="#f1f5f9" font-size="10">앉아윗몸앞으로</text>
    <text x="10" y="84" fill="#94a3b8" font-size="10">M-측정 매핑</text>
    <text x="10" y="100" fill="#475569" font-size="11" font-weight="600">M-ROM (옵션 센서)</text>
    <text x="10" y="115" fill="#64748b" font-size="9">현재 v1.0 미포함</text>
  </g>

  <!-- Card 4: 순발력 -->
  <g transform="translate(490 110)">
    <rect width="140" height="120" fill="#0f172a" stroke="#a78bfa" rx="6"/>
    <text x="70" y="22" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="600">순발력·민첩성</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#334155"/>
    <text x="10" y="50" fill="#94a3b8" font-size="10">PAPS 종목</text>
    <text x="10" y="66" fill="#f1f5f9" font-size="10">50m·제자리멀리</text>
    <text x="10" y="84" fill="#94a3b8" font-size="10">M-측정 매핑</text>
    <text x="10" y="100" fill="#a78bfa" font-size="11" font-weight="600">M2 가속 + M4</text>
    <text x="10" y="115" fill="#64748b" font-size="9">peak accel · jump distance</text>
  </g>

  <!-- Card 5: 균형·협응 (LifespanMove 차별화) -->
  <g transform="translate(640 110)">
    <rect width="140" height="120" fill="#0f172a" stroke="#fbbf24" stroke-width="2" rx="6"/>
    <text x="70" y="22" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">균형·협응 ★</text>
    <line x1="10" y1="30" x2="130" y2="30" stroke="#334155"/>
    <text x="10" y="50" fill="#94a3b8" font-size="10">PAPS 종목</text>
    <text x="10" y="66" fill="#fbbf24" font-size="10">없음 (PAPS gap)</text>
    <text x="10" y="84" fill="#94a3b8" font-size="10">LifespanMove 신설</text>
    <text x="10" y="100" fill="#fbbf24" font-size="11" font-weight="600">M3 + M5</text>
    <text x="10" y="115" fill="#64748b" font-size="9">발달 평가 핵심 ★</text>
  </g>

  <!-- 본인 학생 결과 박스 -->
  <g transform="translate(40 270)">
    <text x="0" y="0" fill="#fbbf24" font-size="11" font-weight="600">우리 아이 결과 (9세, 남)</text>
    <line x1="0" y1="6" x2="200" y2="6" stroke="#fbbf24"/>

    <g transform="translate(0 20)">
      <!-- Score bars -->
      <text x="0" y="14" fill="#94a3b8" font-size="10">심폐지구력</text>
      <rect x="120" y="6" width="240" height="10" fill="#1e293b" rx="2"/>
      <rect x="120" y="6" width="168" height="10" fill="#22d3ee" rx="2"/>
      <text x="370" y="14" fill="#22d3ee" font-size="10" font-weight="600">70%ile</text>

      <text x="0" y="34" fill="#94a3b8" font-size="10">근력·근지구력</text>
      <rect x="120" y="26" width="240" height="10" fill="#1e293b" rx="2"/>
      <rect x="120" y="26" width="132" height="10" fill="#f97316" rx="2"/>
      <text x="370" y="34" fill="#f97316" font-size="10" font-weight="600">55%ile</text>

      <text x="0" y="54" fill="#94a3b8" font-size="10">순발력</text>
      <rect x="120" y="46" width="240" height="10" fill="#1e293b" rx="2"/>
      <rect x="120" y="46" width="192" height="10" fill="#a78bfa" rx="2"/>
      <text x="370" y="54" fill="#a78bfa" font-size="10" font-weight="600">80%ile</text>

      <text x="0" y="74" fill="#94a3b8" font-size="10">균형·협응 ★</text>
      <rect x="120" y="66" width="240" height="10" fill="#1e293b" rx="2"/>
      <rect x="120" y="66" width="108" height="10" fill="#fbbf24" rx="2"/>
      <text x="370" y="74" fill="#fbbf24" font-size="10" font-weight="600">45%ile</text>
    </g>
  </g>

  <!-- 자동 보고서 우측 -->
  <g transform="translate(450 280)">
    <rect width="320" height="180" fill="#0f172a" stroke="#fbbf24" rx="6"/>
    <text x="160" y="22" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">학교 자동 보고서</text>
    <line x1="10" y1="32" x2="310" y2="32" stroke="#334155"/>

    <text x="14" y="56" fill="#f1f5f9" font-size="11" font-weight="600">종합 등급: 2등급 (5등급 척도)</text>
    <text x="14" y="76" fill="#10b981" font-size="10">▲ 강점: 순발력 (상위 20%)</text>
    <text x="14" y="94" fill="#fbbf24" font-size="10">◆ 보완: 균형·협응 (도장 권장)</text>
    <text x="14" y="116" fill="#94a3b8" font-size="10">PAPS 학교 기록부 자동 입력</text>
    <text x="14" y="132" fill="#94a3b8" font-size="10">학부모 알림톡 + PDF 송부</text>
    <text x="14" y="148" fill="#94a3b8" font-size="10">근처 LifespanMove 도장 추천</text>

    <rect x="14" y="156" width="100" height="22" fill="#1e293b" rx="4"/>
    <text x="64" y="170" fill="#22d3ee" font-size="10" text-anchor="middle">PDF 출력</text>
  </g>
</svg>
