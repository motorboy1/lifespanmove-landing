<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="480" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Personalized Exercise Prescription · FITT-VP</text>
  <text x="40" y="60" fill="#64748b" font-size="12">측정 약점 자동 detect → ACSM 2026 framework 정합 처방 + 8주 progression</text>

  <!-- Left: measurement weakness -->
  <g transform="translate(40 90)">
    <text x="0" y="0" fill="#3b82f6" font-size="11" font-weight="600">측정 결과 (백분위)</text>
    <line x1="0" y1="6" x2="180" y2="6" stroke="#3b82f6"/>

    <g transform="translate(0 20)">
      <text x="0" y="14" fill="#94a3b8" font-size="10">M1 보행속도</text>
      <rect x="0" y="20" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="20" width="90" height="8" fill="#3b82f6" rx="2"/>
      <text x="160" y="38" fill="#94a3b8" font-size="9" text-anchor="end">50</text>

      <text x="0" y="60" fill="#94a3b8" font-size="10">M3 균형 ◆</text>
      <rect x="0" y="66" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="66" width="54" height="8" fill="#fbbf24" rx="2"/>
      <text x="160" y="84" fill="#fbbf24" font-size="9" text-anchor="end">30 (약점)</text>

      <text x="0" y="106" fill="#94a3b8" font-size="10">M4 점프 power</text>
      <rect x="0" y="112" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="112" width="90" height="8" fill="#3b82f6" rx="2"/>
      <text x="160" y="130" fill="#94a3b8" font-size="9" text-anchor="end">50</text>

      <text x="0" y="152" fill="#94a3b8" font-size="10">M6 sit-to-stand ◆</text>
      <rect x="0" y="158" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="158" width="45" height="8" fill="#ef4444" rx="2"/>
      <text x="160" y="176" fill="#ef4444" font-size="9" text-anchor="end">25 (약점)</text>

      <text x="0" y="198" fill="#94a3b8" font-size="10">M7 TUG</text>
      <rect x="0" y="204" width="180" height="8" fill="#1e293b" rx="2"/>
      <rect x="0" y="204" width="72" height="8" fill="#fbbf24" rx="2"/>
      <text x="160" y="222" fill="#fbbf24" font-size="9" text-anchor="end">40</text>
    </g>
  </g>

  <!-- Arrow -->
  <g stroke="#475569">
    <line x1="240" y1="200" x2="280" y2="200" stroke-width="1.5"/>
    <polygon points="275,195 285,200 275,205" fill="#475569"/>
  </g>

  <!-- Middle: FITT-VP card -->
  <g transform="translate(300 90)">
    <rect width="280" height="240" fill="#0f172a" stroke="#22d3ee" rx="6"/>
    <text x="140" y="22" fill="#22d3ee" font-size="12" text-anchor="middle" font-weight="600">FITT-VP 처방</text>
    <line x1="10" y1="32" x2="270" y2="32" stroke="#334155"/>

    <g font-size="11">
      <text x="14" y="56" fill="#94a3b8">F</text>
      <text x="34" y="56" fill="#64748b" font-size="9">requency</text>
      <text x="100" y="56" fill="#f1f5f9">주 3회 (월·수·금)</text>

      <text x="14" y="86" fill="#94a3b8">I</text>
      <text x="34" y="86" fill="#64748b" font-size="9">ntensity</text>
      <text x="100" y="86" fill="#f1f5f9">RPE 13–14</text>
      <text x="100" y="100" fill="#64748b" font-size="9">(somewhat hard)</text>

      <text x="14" y="126" fill="#94a3b8">T</text>
      <text x="34" y="126" fill="#64748b" font-size="9">ime</text>
      <text x="100" y="126" fill="#f1f5f9">30 분/회</text>

      <text x="14" y="156" fill="#94a3b8">T</text>
      <text x="34" y="156" fill="#64748b" font-size="9">ype</text>
      <text x="100" y="156" fill="#fbbf24">균형 (단발·eyes-closed)</text>
      <text x="100" y="170" fill="#ef4444">하지파워 (5RST 점진 부하)</text>

      <text x="14" y="196" fill="#94a3b8">V</text>
      <text x="34" y="196" fill="#64748b" font-size="9">olume</text>
      <text x="100" y="196" fill="#f1f5f9">3 sets × 12 rep</text>

      <text x="14" y="226" fill="#94a3b8">P</text>
      <text x="34" y="226" fill="#64748b" font-size="9">rogression</text>
      <text x="100" y="226" fill="#f1f5f9">2주마다 부하 +5%</text>
    </g>
  </g>

  <!-- Right: 8-week progression -->
  <g transform="translate(610 90)">
    <text x="0" y="0" fill="#10b981" font-size="11" font-weight="600">8-Week Progression</text>
    <line x1="0" y1="6" x2="160" y2="6" stroke="#10b981"/>

    <!-- Mini week bars -->
    <g transform="translate(0 24)">
      <text x="0" y="10" fill="#64748b" font-size="9">Load</text>
      <rect x="40" y="2"  width="14" height="10" fill="#22d3ee" opacity="0.3"/>
      <rect x="56" y="2"  width="14" height="10" fill="#22d3ee" opacity="0.45"/>
      <rect x="72" y="2"  width="14" height="10" fill="#22d3ee" opacity="0.6"/>
      <rect x="88" y="2"  width="14" height="10" fill="#22d3ee" opacity="0.75"/>
      <rect x="104" y="2" width="14" height="10" fill="#22d3ee" opacity="0.85"/>
      <rect x="120" y="2" width="14" height="10" fill="#22d3ee" opacity="0.9"/>
      <rect x="136" y="2" width="14" height="10" fill="#22d3ee" opacity="0.95"/>
      <rect x="152" y="2" width="14" height="10" fill="#22d3ee" opacity="1.0"/>

      <text x="0" y="38" fill="#64748b" font-size="9">Vol</text>
      <text x="42" y="38" fill="#94a3b8" font-size="8">3×8</text>
      <text x="58" y="38" fill="#94a3b8" font-size="8">3×10</text>
      <text x="74" y="38" fill="#94a3b8" font-size="8">3×12</text>
      <text x="90" y="38" fill="#94a3b8" font-size="8">3×12</text>
      <text x="106" y="38" fill="#94a3b8" font-size="8">4×10</text>
      <text x="122" y="38" fill="#94a3b8" font-size="8">4×12</text>
      <text x="138" y="38" fill="#94a3b8" font-size="8">4×12</text>
      <text x="154" y="38" fill="#94a3b8" font-size="8">5×10</text>

      <line x1="40" y1="50" x2="180" y2="50" stroke="#334155"/>
      <g fill="#64748b" font-size="9" text-anchor="middle">
        <text x="47" y="64">W1</text>
        <text x="79" y="64">W3</text>
        <text x="111" y="64">W5</text>
        <text x="143" y="64">W7</text>
      </g>
    </g>

    <!-- Re-measure milestones -->
    <g transform="translate(0 110)">
      <rect width="180" height="90" fill="#0f172a" stroke="#334155" rx="4"/>
      <text x="10" y="18" fill="#10b981" font-size="10" font-weight="600">재측정 milestone</text>
      <text x="10" y="36" fill="#94a3b8" font-size="9">W4: 균형 백분위 확인</text>
      <text x="10" y="50" fill="#94a3b8" font-size="9">W8: 5RST 재평가</text>
      <text x="10" y="64" fill="#94a3b8" font-size="9">→ 자동 progression 갱신</text>
      <text x="10" y="82" fill="#fbbf24" font-size="9">목표: M3 50%ile, M6 50%ile</text>
    </g>
  </g>

  <!-- Bottom: rationale -->
  <g transform="translate(40 360)">
    <rect width="720" height="90" fill="#0f172a" stroke="#334155" rx="6"/>
    <text x="14" y="22" fill="#cbd5e1" font-size="11" font-weight="600">처방 근거</text>
    <text x="14" y="42" fill="#94a3b8" font-size="10">◆ M3 균형 30%ile · M6 5RST 25%ile → 낙상위험 zone (도판 ⑤ 참조)</text>
    <text x="14" y="58" fill="#94a3b8" font-size="10">◆ ACSM 2026 노인 trainability evidence: 8주 progressive resistance + balance 결합 효과 입증</text>
    <text x="14" y="74" fill="#94a3b8" font-size="10">◆ 본인 366명 코호트 평균 8주 후 M3 +25%, M6 +18% 개선 (도판 ⑧ waterfall)</text>
  </g>
</svg>
