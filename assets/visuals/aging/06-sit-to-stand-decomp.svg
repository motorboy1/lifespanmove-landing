<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="760" height="460" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">5-Rep Sit-to-Stand · 200Hz IMU Decomposition</text>
  <text x="40" y="60" fill="#64748b" font-size="12">M6 · 본인 72세 · 8.4초 · 동연령 평균 35백분위</text>

  <!-- Time-power chart -->
  <line x1="80" y1="240" x2="640" y2="240" stroke="#334155"/>
  <line x1="80" y1="100" x2="80" y2="240" stroke="#334155"/>

  <g fill="#64748b" font-size="10" text-anchor="end">
    <text x="72" y="244">0</text>
    <text x="72" y="206">1</text>
    <text x="72" y="168">2</text>
    <text x="72" y="130">3</text>
  </g>
  <text x="36" y="170" fill="#cbd5e1" font-size="11" transform="rotate(-90 36 170)" text-anchor="middle">Power (W/kg)</text>

  <g fill="#64748b" font-size="10" text-anchor="middle">
    <text x="80" y="258">0</text>
    <text x="192" y="258">2</text>
    <text x="304" y="258">4</text>
    <text x="416" y="258">6</text>
    <text x="528" y="258">8</text>
    <text x="640" y="258">10</text>
  </g>
  <text x="360" y="278" fill="#cbd5e1" font-size="11" text-anchor="middle">Time (s)</text>

  <!-- Rep peaks (5 reps spread, decreasing amplitude = fatigue) -->
  <!-- Each rep: prep -> lift (peak) -> down -->
  <g>
    <!-- Rep 1 around t=0.8s, peak ~2.5 -->
    <path d="M 84 240 L 92 235 L 100 220 L 108 145 L 116 165 L 124 215 L 132 232 L 140 240"
          fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Rep 2 ~ 2.5s, peak ~2.3 -->
    <path d="M 156 240 L 164 235 L 172 218 L 180 150 L 188 168 L 196 215 L 204 233 L 212 240"
          fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Rep 3 ~ 4.4s, peak ~2.0 -->
    <path d="M 240 240 L 248 235 L 256 220 L 264 165 L 272 180 L 280 218 L 288 233 L 296 240"
          fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Rep 4 ~ 6.3s, peak ~1.8 -->
    <path d="M 332 240 L 340 235 L 348 220 L 356 175 L 364 188 L 372 218 L 380 233 L 388 240"
          fill="#22d3ee" fill-opacity="0.25" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Rep 5 ~ 8.2s, peak ~1.5 = fatigue -->
    <path d="M 432 240 L 440 235 L 448 222 L 456 185 L 464 195 L 472 220 L 480 234 L 488 240"
          fill="#f97316" fill-opacity="0.30" stroke="#f97316" stroke-width="1.5"/>
  </g>

  <!-- Rep labels -->
  <g fill="#94a3b8" font-size="10" text-anchor="middle" font-weight="600">
    <text x="112" y="115">R1</text>
    <text x="184" y="118">R2</text>
    <text x="268" y="135">R3</text>
    <text x="360" y="145">R4</text>
    <text x="460" y="155" fill="#f97316">R5</text>
  </g>

  <!-- Reference average (dashed line at ~2.1 = age 70 mean) -->
  <line x1="80" y1="160" x2="640" y2="160" stroke="#10b981" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="635" y="155" fill="#10b981" font-size="9" text-anchor="end">동연령 70세 평균 peak (2.1 W/kg)</text>

  <!-- Fatigue arrow annotation -->
  <g>
    <path d="M 108 90 Q 280 80, 460 130" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
    <polygon points="455,128 460,135 455,140" fill="#f97316" opacity="0.7"/>
    <text x="280" y="76" fill="#f97316" font-size="10" text-anchor="middle">Peak power ↓ 40% (R1→R5, fatigue)</text>
  </g>

  <!-- Phase legend -->
  <g transform="translate(530 100)">
    <rect width="180" height="62" fill="#0f172a" stroke="#334155" rx="4"/>
    <text x="10" y="16" fill="#cbd5e1" font-size="10" font-weight="600">Phases (per rep)</text>
    <rect x="10" y="24" width="14" height="6" fill="#22d3ee" fill-opacity="0.25"/>
    <text x="30" y="30" fill="#94a3b8" font-size="9">prep · lift · down (R1–R4)</text>
    <rect x="10" y="38" width="14" height="6" fill="#f97316" fill-opacity="0.30"/>
    <text x="30" y="44" fill="#94a3b8" font-size="9">fatigue marker (R5)</text>
    <text x="10" y="58" fill="#64748b" font-size="9">IMU vertical accel → integrate</text>
  </g>

  <!-- Metrics table -->
  <g transform="translate(80 300)">
    <rect width="600" height="130" fill="#0f172a" stroke="#334155" rx="4"/>
    <text x="15" y="22" fill="#f1f5f9" font-size="12" font-weight="600">개인 지표 vs 동연령 70세 reference (n=42)</text>

    <line x1="15" y1="32" x2="585" y2="32" stroke="#334155"/>
    <g font-size="11">
      <text x="20" y="50" fill="#94a3b8">Peak power</text>
      <text x="180" y="50" fill="#f1f5f9">1.4 W/kg</text>
      <text x="300" y="50" fill="#64748b">평균 2.1</text>
      <text x="420" y="50" fill="#fbbf24">35 백분위 ↓</text>

      <text x="20" y="72" fill="#94a3b8">Rep duration (avg)</text>
      <text x="180" y="72" fill="#f1f5f9">1.68 s</text>
      <text x="300" y="72" fill="#64748b">평균 1.30 s</text>
      <text x="420" y="72" fill="#fbbf24">29 백분위 ↓</text>

      <text x="20" y="94" fill="#94a3b8">Rep-to-rep CV</text>
      <text x="180" y="94" fill="#f1f5f9">18 %</text>
      <text x="300" y="94" fill="#64748b">평균 8 %</text>
      <text x="420" y="94" fill="#ef4444">15 백분위 ↓ (변동성 ↑)</text>

      <text x="20" y="116" fill="#94a3b8">R5 vs R1 lift time</text>
      <text x="180" y="116" fill="#f1f5f9">+24 %</text>
      <text x="300" y="116" fill="#64748b">평균 +6 %</text>
      <text x="420" y="116" fill="#ef4444">피로 의심</text>
    </g>
  </g>
</svg>
