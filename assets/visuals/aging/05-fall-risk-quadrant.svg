<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="760" height="460" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Fall Risk Quadrant</text>
  <text x="40" y="60" fill="#64748b" font-size="12">M7 TUG × M-α (MFDFA) 통합 · 65–85세 reference cloud · n = 366</text>

  <!-- Quadrant background (TL low risk, BR high risk) -->
  <rect x="120" y="100" width="540" height="280" fill="#0f172a"/>

  <!-- High risk shading (bottom-right quadrant emphasis) -->
  <rect x="390" y="240" width="270" height="140" fill="#ef4444" fill-opacity="0.10"/>
  <rect x="120" y="100" width="270" height="140" fill="#10b981" fill-opacity="0.08"/>

  <!-- Axes -->
  <line x1="120" y1="380" x2="660" y2="380" stroke="#334155"/>
  <line x1="120" y1="100" x2="120" y2="380" stroke="#334155"/>

  <!-- Center cross (median lines) -->
  <line x1="390" y1="100" x2="390" y2="380" stroke="#475569" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="120" y1="240" x2="660" y2="240" stroke="#475569" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Quadrant labels -->
  <text x="135" y="120" fill="#10b981" font-size="11" font-weight="600" opacity="0.8">LOW · 안전</text>
  <text x="135" y="135" fill="#64748b" font-size="9">↑ MFDFA, ↓ TUG</text>

  <text x="645" y="120" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="end" opacity="0.8">MEDIUM · 균형 양호 / 보행 둔화</text>

  <text x="135" y="265" fill="#fbbf24" font-size="11" font-weight="600" opacity="0.8">MEDIUM · 보행 ok / 변동성 낮음</text>

  <text x="645" y="265" fill="#ef4444" font-size="11" font-weight="600" text-anchor="end" opacity="0.8">HIGH · 우선 중재</text>

  <!-- Y-axis: MFDFA α (높을수록 좋음) -->
  <g fill="#64748b" font-size="10" text-anchor="end">
    <text x="112" y="104">1.2</text>
    <text x="112" y="172">0.95</text>
    <text x="112" y="244">0.7</text>
    <text x="112" y="312">0.55</text>
    <text x="112" y="384">0.4</text>
  </g>
  <text x="75" y="240" fill="#cbd5e1" font-size="11" transform="rotate(-90 75 240)" text-anchor="middle">MFDFA α (adaptive ↑)</text>

  <!-- X-axis: TUG seconds (낮을수록 좋음 → 오른쪽이 위험) -->
  <g fill="#64748b" font-size="10" text-anchor="middle">
    <text x="120" y="400">6</text>
    <text x="255" y="400">10</text>
    <text x="390" y="400">14</text>
    <text x="525" y="400">18</text>
    <text x="660" y="400">22</text>
  </g>
  <text x="390" y="425" fill="#cbd5e1" font-size="11" text-anchor="middle">TUG (초) · 낮을수록 좋음 →</text>

  <!-- Reference cloud (KDE-like ellipses) -->
  <ellipse cx="280" cy="180" rx="120" ry="55" fill="#3b82f6" fill-opacity="0.18" stroke="none"/>
  <ellipse cx="280" cy="180" rx="80" ry="35" fill="#3b82f6" fill-opacity="0.28" stroke="none"/>
  <ellipse cx="280" cy="180" rx="40" ry="18" fill="#3b82f6" fill-opacity="0.45" stroke="none"/>

  <!-- Sparse scatter points -->
  <g fill="#3b82f6" opacity="0.55">
    <circle cx="180" cy="155" r="2"/>
    <circle cx="210" cy="178" r="2"/>
    <circle cx="240" cy="165" r="2"/>
    <circle cx="265" cy="190" r="2"/>
    <circle cx="295" cy="172" r="2"/>
    <circle cx="320" cy="195" r="2"/>
    <circle cx="345" cy="210" r="2"/>
    <circle cx="370" cy="225" r="2"/>
    <circle cx="395" cy="245" r="2"/>
    <circle cx="420" cy="265" r="2"/>
    <circle cx="450" cy="280" r="2"/>
    <circle cx="480" cy="295" r="2"/>
    <circle cx="510" cy="310" r="2"/>
    <circle cx="540" cy="320" r="2"/>
    <circle cx="565" cy="330" r="2"/>
    <circle cx="590" cy="345" r="2"/>
  </g>

  <!-- Trend arrow: aging direction -->
  <g opacity="0.6">
    <path d="M 200 165 Q 380 240, 590 340" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2 3"/>
    <polygon points="588,335 600,345 588,345" fill="#94a3b8"/>
    <text x="500" y="295" fill="#94a3b8" font-size="10" font-style="italic">노화 진행</text>
  </g>

  <!-- User point: high-risk quadrant -->
  <g>
    <circle cx="540" cy="310" r="8" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
    <line x1="540" y1="310" x2="600" y2="270" stroke="#fbbf24" stroke-dasharray="2 2"/>
    <g transform="translate(600 230)">
      <rect width="150" height="48" fill="#0f172a" stroke="#fbbf24" rx="4"/>
      <text x="10" y="16" fill="#fbbf24" font-size="11" font-weight="600">본인 · 72세</text>
      <text x="10" y="30" fill="#fde68a" font-size="10">TUG 16.5s · α 0.58</text>
      <text x="10" y="44" fill="#fca5a5" font-size="10">HIGH risk · 우선 중재</text>
    </g>
  </g>
</svg>
