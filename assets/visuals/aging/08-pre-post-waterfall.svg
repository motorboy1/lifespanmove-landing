<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="460" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">8-Week Intervention · Individual Response Waterfall</text>
  <text x="40" y="60" fill="#64748b" font-size="12">M3 sway area Δ · n=24 (65–75세) · sorted by individual response</text>

  <!-- Axes -->
  <line x1="80" y1="240" x2="740" y2="240" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="380" stroke="#334155"/>

  <!-- Y axis: delta -->
  <g fill="#64748b" font-size="10" text-anchor="end">
    <text x="72" y="104" fill="#ef4444">+30 % (악화)</text>
    <text x="72" y="172" fill="#fbbf24">+10</text>
    <text x="72" y="244">0</text>
    <text x="72" y="312" fill="#10b981">-10</text>
    <text x="72" y="380" fill="#10b981">-30 % (개선)</text>
  </g>

  <!-- Zero baseline -->
  <text x="745" y="244" fill="#475569" font-size="9">no Δ</text>

  <!-- No-change band -->
  <rect x="80" y="225" width="660" height="30" fill="#475569" fill-opacity="0.08"/>

  <!-- Waterfall bars: 24 subjects sorted -->
  <!-- 2 worsened (red, above zero) -->
  <g>
    <rect x="92" y="170" width="20" height="70" fill="#ef4444" fill-opacity="0.7"/>
    <rect x="116" y="195" width="20" height="45" fill="#ef4444" fill-opacity="0.7"/>
  </g>

  <!-- 4 no-change (slate, near zero) -->
  <g>
    <rect x="142" y="225" width="20" height="15" fill="#94a3b8" fill-opacity="0.5"/>
    <rect x="166" y="228" width="20" height="12" fill="#94a3b8" fill-opacity="0.5"/>
    <rect x="190" y="232" width="20" height="8" fill="#94a3b8" fill-opacity="0.5"/>
    <rect x="214" y="240" width="20" height="6" fill="#94a3b8" fill-opacity="0.5"/>
  </g>

  <!-- 18 improved (green, below zero, sorted ascending improvement magnitude) -->
  <g>
    <rect x="240" y="240" width="20" height="10" fill="#10b981" fill-opacity="0.55"/>
    <rect x="264" y="240" width="20" height="14" fill="#10b981" fill-opacity="0.6"/>
    <rect x="288" y="240" width="20" height="18" fill="#10b981" fill-opacity="0.62"/>
    <rect x="312" y="240" width="20" height="22" fill="#10b981" fill-opacity="0.65"/>
    <rect x="336" y="240" width="20" height="28" fill="#10b981" fill-opacity="0.68"/>
    <rect x="360" y="240" width="20" height="32" fill="#10b981" fill-opacity="0.7"/>
    <rect x="384" y="240" width="20" height="38" fill="#10b981" fill-opacity="0.72"/>
    <rect x="408" y="240" width="20" height="42" fill="#10b981" fill-opacity="0.75"/>
    <rect x="432" y="240" width="20" height="48" fill="#10b981" fill-opacity="0.78"/>
    <rect x="456" y="240" width="20" height="55" fill="#10b981" fill-opacity="0.8"/>
    <rect x="480" y="240" width="20" height="62" fill="#10b981" fill-opacity="0.82"/>
    <rect x="504" y="240" width="20" height="70" fill="#10b981" fill-opacity="0.85"/>
    <rect x="528" y="240" width="20" height="78" fill="#10b981" fill-opacity="0.88"/>
    <rect x="552" y="240" width="20" height="85" fill="#10b981" fill-opacity="0.9"/>
    <rect x="576" y="240" width="20" height="95" fill="#10b981" fill-opacity="0.92"/>
    <!-- User bar -->
    <rect x="600" y="240" width="20" height="105" fill="#fbbf24" stroke="#fde68a" stroke-width="1.5"/>
    <rect x="624" y="240" width="20" height="118" fill="#10b981" fill-opacity="0.97"/>
    <rect x="648" y="240" width="20" height="130" fill="#10b981"/>
  </g>

  <!-- User annotation -->
  <g>
    <line x1="610" y1="345" x2="660" y2="395" stroke="#fbbf24" stroke-dasharray="2 2"/>
    <g transform="translate(560 395)">
      <rect width="200" height="40" fill="#0f172a" stroke="#fbbf24" rx="4"/>
      <text x="10" y="16" fill="#fbbf24" font-size="11" font-weight="600">본인 · Δ -22%</text>
      <text x="10" y="32" fill="#fde68a" font-size="10">상위 25% responder</text>
    </g>
  </g>

  <text x="400" y="402" fill="#cbd5e1" font-size="11" text-anchor="middle">Individual subjects (sorted by response)</text>

  <!-- Summary panel -->
  <g transform="translate(80 95)">
    <rect width="220" height="60" fill="#0f172a" stroke="#334155" rx="4"/>
    <text x="12" y="20" fill="#cbd5e1" font-size="11" font-weight="600">Summary</text>
    <text x="12" y="38" fill="#10b981" font-size="10">개선 18 / 24 (75%)</text>
    <text x="12" y="52" fill="#94a3b8" font-size="10">no Δ 4 · 악화 2 (재평가 의뢰)</text>
  </g>

  <g transform="translate(310 95)">
    <rect width="220" height="60" fill="#0f172a" stroke="#334155" rx="4"/>
    <text x="12" y="20" fill="#cbd5e1" font-size="11" font-weight="600">Statistics</text>
    <text x="12" y="38" fill="#94a3b8" font-size="10">Paired t-test: p = 0.001</text>
    <text x="12" y="52" fill="#94a3b8" font-size="10">Cohen's d = 0.82 (large effect)</text>
  </g>

  <g transform="translate(540 95)">
    <rect width="200" height="60" fill="#0f172a" stroke="#334155" rx="4"/>
    <text x="12" y="20" fill="#cbd5e1" font-size="11" font-weight="600">Median Δ</text>
    <text x="12" y="38" fill="#10b981" font-size="10">-15.5 % (improved)</text>
    <text x="12" y="52" fill="#94a3b8" font-size="10">IQR: -22% to -8%</text>
  </g>
</svg>
