<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="520" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Sarcopenia Auto-Screening</text>
  <text x="40" y="60" fill="#64748b" font-size="12">AWGS 2025 공식 알고리즘 정합 · LifespanMove auto-capture · 의료진 dashboard</text>

  <!-- Step 1: Case finding -->
  <g>
    <text x="40" y="100" fill="#3b82f6" font-size="11" font-weight="600">STEP 1 · Case finding</text>
    <line x1="40" y1="105" x2="160" y2="105" stroke="#3b82f6" stroke-width="1"/>

    <g transform="translate(60 120)">
      <rect width="150" height="60" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="75" y="22" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="600">Calf circ.</text>
      <text x="75" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">남 &lt; 34 cm</text>
      <text x="75" y="54" fill="#94a3b8" font-size="10" text-anchor="middle">여 &lt; 33 cm</text>
    </g>
    <text x="230" y="155" fill="#475569" font-size="14" text-anchor="middle">OR</text>
    <g transform="translate(250 120)">
      <rect width="150" height="60" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="75" y="22" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="600">SARC-F</text>
      <text x="75" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">≥ 4</text>
      <text x="75" y="54" fill="#94a3b8" font-size="10" text-anchor="middle">(5-item questionnaire)</text>
    </g>
    <text x="420" y="155" fill="#475569" font-size="14" text-anchor="middle">OR</text>
    <g transform="translate(440 120)">
      <rect width="150" height="60" rx="6" fill="#0f172a" stroke="#334155"/>
      <text x="75" y="22" fill="#cbd5e1" font-size="11" text-anchor="middle" font-weight="600">SARC-F + CC</text>
      <text x="75" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">≥ 11</text>
      <text x="75" y="54" fill="#94a3b8" font-size="10" text-anchor="middle">(combined score)</text>
    </g>
  </g>

  <!-- Arrow down -->
  <g stroke="#475569">
    <line x1="320" y1="190" x2="320" y2="220" stroke-width="1.5"/>
    <polygon points="315,215 320,225 325,215" fill="#475569"/>
  </g>

  <!-- Step 2: Assessment (LifespanMove auto) -->
  <g>
    <text x="40" y="245" fill="#22d3ee" font-size="11" font-weight="600">STEP 2 · Assessment (LifespanMove auto-capture)</text>
    <line x1="40" y1="250" x2="320" y2="250" stroke="#22d3ee" stroke-width="1"/>

    <g transform="translate(60 265)">
      <rect width="180" height="74" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="90" y="22" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">Strength</text>
      <text x="90" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">Hand grip</text>
      <text x="90" y="56" fill="#fbbf24" font-size="11" text-anchor="middle">남 &lt; 28 / 여 &lt; 18 kg</text>
      <text x="90" y="70" fill="#22d3ee" font-size="9" text-anchor="middle">[M-grip 모듈]</text>
    </g>

    <g transform="translate(260 265)">
      <rect width="180" height="74" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="90" y="22" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">Physical performance</text>
      <text x="90" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">5-CST</text>
      <text x="90" y="56" fill="#fbbf24" font-size="11" text-anchor="middle">&gt; 12 s</text>
      <text x="90" y="70" fill="#22d3ee" font-size="9" text-anchor="middle">[M6 · 200Hz IMU]</text>
    </g>

    <g transform="translate(460 265)">
      <rect width="180" height="74" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="90" y="22" fill="#f1f5f9" font-size="11" text-anchor="middle" font-weight="600">Function</text>
      <text x="90" y="40" fill="#94a3b8" font-size="10" text-anchor="middle">Gait speed</text>
      <text x="90" y="56" fill="#fbbf24" font-size="11" text-anchor="middle">&lt; 1.0 m/s</text>
      <text x="90" y="70" fill="#22d3ee" font-size="9" text-anchor="middle">[M1 · 10m walk]</text>
    </g>
  </g>

  <!-- Arrow down -->
  <g stroke="#475569">
    <line x1="350" y1="350" x2="350" y2="380" stroke-width="1.5"/>
    <polygon points="345,375 350,385 355,375" fill="#475569"/>
  </g>

  <!-- Step 3: Diagnosis (branching) -->
  <g>
    <text x="40" y="405" fill="#10b981" font-size="11" font-weight="600">STEP 3 · Diagnosis &amp; routing</text>
    <line x1="40" y1="410" x2="240" y2="410" stroke="#10b981" stroke-width="1"/>

    <g transform="translate(60 425)">
      <rect width="170" height="74" rx="6" fill="#064e3b" fill-opacity="0.3" stroke="#10b981"/>
      <text x="85" y="22" fill="#10b981" font-size="11" text-anchor="middle" font-weight="600">Possible</text>
      <text x="85" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle">low strength OR</text>
      <text x="85" y="54" fill="#cbd5e1" font-size="10" text-anchor="middle">low performance</text>
      <text x="85" y="68" fill="#10b981" font-size="9" text-anchor="middle">→ lifestyle 권고</text>
    </g>

    <g transform="translate(260 425)">
      <rect width="170" height="74" rx="6" fill="#78350f" fill-opacity="0.3" stroke="#fbbf24"/>
      <text x="85" y="22" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">Confirmed</text>
      <text x="85" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle">low strength +</text>
      <text x="85" y="54" fill="#cbd5e1" font-size="10" text-anchor="middle">muscle mass ↓</text>
      <text x="85" y="68" fill="#fbbf24" font-size="9" text-anchor="middle">→ DXA + 운동처방</text>
    </g>

    <g transform="translate(460 425)">
      <rect width="170" height="74" rx="6" fill="#7f1d1d" fill-opacity="0.3" stroke="#ef4444"/>
      <text x="85" y="22" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">Severe</text>
      <text x="85" y="40" fill="#cbd5e1" font-size="10" text-anchor="middle">all 3 criteria</text>
      <text x="85" y="54" fill="#cbd5e1" font-size="10" text-anchor="middle">positive</text>
      <text x="85" y="68" fill="#ef4444" font-size="9" text-anchor="middle">→ 재활의학과 의뢰</text>
    </g>
  </g>

  <!-- Side panel: this subject -->
  <g transform="translate(650 120)">
    <rect width="130" height="380" fill="#0f172a" stroke="#fbbf24" rx="6"/>
    <text x="65" y="22" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">본인 (72세)</text>
    <line x1="10" y1="32" x2="120" y2="32" stroke="#334155"/>

    <text x="10" y="56" fill="#94a3b8" font-size="10">CC</text>
    <text x="120" y="56" fill="#f1f5f9" font-size="11" text-anchor="end">32.5 cm ✗</text>

    <text x="10" y="78" fill="#94a3b8" font-size="10">SARC-F</text>
    <text x="120" y="78" fill="#f1f5f9" font-size="11" text-anchor="end">5 ✗</text>

    <text x="10" y="100" fill="#94a3b8" font-size="10">Grip</text>
    <text x="120" y="100" fill="#f1f5f9" font-size="11" text-anchor="end">24 kg ✗</text>

    <text x="10" y="122" fill="#94a3b8" font-size="10">5-CST</text>
    <text x="120" y="122" fill="#f1f5f9" font-size="11" text-anchor="end">13.8 s ✗</text>

    <text x="10" y="144" fill="#94a3b8" font-size="10">Gait</text>
    <text x="120" y="144" fill="#f1f5f9" font-size="11" text-anchor="end">0.85 m/s ✗</text>

    <line x1="10" y1="160" x2="120" y2="160" stroke="#334155"/>
    <text x="65" y="184" fill="#ef4444" font-size="12" text-anchor="middle" font-weight="600">→ Severe</text>
    <text x="65" y="206" fill="#fca5a5" font-size="10" text-anchor="middle">DXA + 재활의학과</text>
    <text x="65" y="222" fill="#fca5a5" font-size="10" text-anchor="middle">의뢰서 자동 생성</text>

    <rect x="20" y="240" width="90" height="32" fill="#dc2626" rx="4"/>
    <text x="65" y="260" fill="#fee2e2" font-size="11" text-anchor="middle" font-weight="600">의뢰서 출력</text>
  </g>
</svg>
