<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="m4grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="760" height="460" fill="#0a0e1a"/>

  <!-- Title block -->
  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Lifespan Motor Trajectory</text>
  <text x="40" y="60" fill="#64748b" font-size="12">M1–M7 통합 백분위 · n = 450 (자체 IRB) · LifespanMove v1.0</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="720" y2="380" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="100" x2="80" y2="380" stroke="#334155" stroke-width="1"/>

  <!-- Y ticks -->
  <g fill="#64748b" font-size="10" text-anchor="end">
    <text x="72" y="384">0</text>
    <text x="72" y="324">25</text>
    <text x="72" y="244">50</text>
    <text x="72" y="164">75</text>
    <text x="72" y="104">100</text>
  </g>
  <g stroke="#1e293b" stroke-dasharray="2 4">
    <line x1="80" y1="320" x2="720" y2="320"/>
    <line x1="80" y1="240" x2="720" y2="240"/>
    <line x1="80" y1="160" x2="720" y2="160"/>
  </g>
  <text x="40" y="240" fill="#64748b" font-size="11" transform="rotate(-90 40 240)" text-anchor="middle">정규화 점수 (백분위)</text>

  <!-- X ticks: 4 ~ 85 mapped to 80~720 (log-linear hybrid simplified) -->
  <g fill="#64748b" font-size="11" text-anchor="middle">
    <text x="100" y="400">4</text>
    <text x="180" y="400">12</text>
    <text x="280" y="400">25</text>
    <text x="420" y="400">45</text>
    <text x="560" y="400">65</text>
    <text x="700" y="400">85</text>
  </g>
  <text x="400" y="430" fill="#64748b" font-size="11" text-anchor="middle">연령 (세)</text>

  <!-- 25-75 percentile ribbon (composite envelope) -->
  <path d="M 100 220 Q 200 130, 280 115 Q 360 120, 420 145 Q 520 200, 620 260 Q 680 300, 720 330
           L 720 360 Q 680 330, 620 290 Q 520 240, 420 195 Q 360 175, 280 165 Q 200 175, 100 260 Z"
        fill="url(#ribbon)" stroke="none"/>

  <!-- M4 peak power (cyan, peaks at ~22 yr) -->
  <path d="M 100 290 Q 180 170, 260 105 Q 340 130, 420 220 Q 520 295, 620 340 Q 680 365, 720 372"
        fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.85"/>

  <!-- M1 gait speed (slate, plateau then decline) -->
  <path d="M 100 250 Q 180 175, 280 155 Q 380 150, 480 165 Q 560 195, 640 240 Q 700 280, 720 305"
        fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.85"/>

  <!-- M6 sit-to-stand (orange, sharp decline after 60) -->
  <path d="M 100 280 Q 200 195, 320 175 Q 440 175, 520 195 Q 580 220, 640 280 Q 690 330, 720 360"
        fill="none" stroke="#f97316" stroke-width="2" opacity="0.85"/>

  <!-- User point: 70yr, 60th percentile -->
  <g>
    <line x1="600" y1="232" x2="600" y2="380" stroke="#fbbf24" stroke-dasharray="2 2" opacity="0.5"/>
    <circle cx="600" cy="232" r="6" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
    <text x="610" y="222" fill="#fbbf24" font-size="11" font-weight="600">본인 · 70세</text>
    <text x="610" y="236" fill="#fde68a" font-size="10">통합 60백분위</text>
  </g>

  <!-- Legend -->
  <g transform="translate(550 100)">
    <rect width="160" height="76" fill="#0f172a" stroke="#334155" rx="4"/>
    <line x1="10" y1="18" x2="30" y2="18" stroke="#22d3ee" stroke-width="2"/>
    <text x="36" y="22" fill="#cbd5e1" font-size="10">M4 Jump power</text>
    <line x1="10" y1="34" x2="30" y2="34" stroke="#94a3b8" stroke-width="2"/>
    <text x="36" y="38" fill="#cbd5e1" font-size="10">M1 Gait speed</text>
    <line x1="10" y1="50" x2="30" y2="50" stroke="#f97316" stroke-width="2"/>
    <text x="36" y="54" fill="#cbd5e1" font-size="10">M6 Sit-to-stand</text>
    <rect x="10" y="60" width="20" height="8" fill="url(#ribbon)"/>
    <text x="36" y="68" fill="#cbd5e1" font-size="10">25–75 백분위 ribbon</text>
  </g>
</svg>
