<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="460" fill="#0a0e1a"/>

  <text x="40" y="40" fill="#f1f5f9" font-size="18" font-weight="600">Postural Sway · Lifespan Atlas</text>
  <text x="40" y="60" fill="#64748b" font-size="12">M3 외발 서기 30초 · COP trajectory (AP × ML) · 연령군 평균 + 본인 overlay</text>

  <!-- 7 small multiples in row -->
  <g transform="translate(40 100)">
    <!-- Cell 1: age 6 -->
    <g>
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 42 35, 55 28 Q 65 38, 58 52 Q 48 60, 45 45 Q 52 38, 55 50" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">6세</text>
      <text x="50" y="132" fill="#64748b" font-size="9" text-anchor="middle">280 mm²</text>
    </g>

    <!-- Cell 2: age 12 -->
    <g transform="translate(108 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 48 45, 54 42 Q 56 48, 52 53 Q 47 50, 50 47 Q 53 50, 50 50" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">12세</text>
      <text x="50" y="132" fill="#64748b" font-size="9" text-anchor="middle">120 mm²</text>
    </g>

    <!-- Cell 3: age 25 -->
    <g transform="translate(216 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 49 48, 52 47 Q 53 50, 51 51 Q 49 50, 50 49" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">25세</text>
      <text x="50" y="132" fill="#10b981" font-size="9" text-anchor="middle">65 mm² (peak)</text>
    </g>

    <!-- Cell 4: age 45 -->
    <g transform="translate(324 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 47 47, 53 45 Q 56 50, 52 53 Q 47 52, 49 48" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">45세</text>
      <text x="50" y="132" fill="#64748b" font-size="9" text-anchor="middle">95 mm²</text>
    </g>

    <!-- Cell 5: age 60 -->
    <g transform="translate(432 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 42 40, 58 35 Q 64 48, 55 58 Q 42 56, 45 45 Q 52 38, 56 50 Q 50 55, 48 47" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">60세</text>
      <text x="50" y="132" fill="#fbbf24" font-size="9" text-anchor="middle">180 mm²</text>
    </g>

    <!-- Cell 6: age 72 (user) -->
    <g transform="translate(540 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 38 35, 60 28 Q 70 45, 56 60 Q 38 58, 42 42 Q 55 32, 62 50 Q 48 62, 40 48 Q 52 38, 60 52" fill="none" stroke="#fbbf24" stroke-width="1.4" opacity="0.95"/>
      <text x="50" y="118" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">72세 (본인)</text>
      <text x="50" y="132" fill="#fde68a" font-size="9" text-anchor="middle">320 mm² (30%ile)</text>
    </g>

    <!-- Cell 7: age 80 -->
    <g transform="translate(648 0)">
      <rect width="100" height="100" fill="#0f172a" stroke="#1e293b"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b"/>
      <path d="M 50 50 Q 30 30, 65 25 Q 75 45, 60 65 Q 30 62, 38 38 Q 58 28, 68 52 Q 42 68, 32 45 Q 55 32, 70 55 Q 48 70, 35 50" fill="none" stroke="#ef4444" stroke-width="1.4" opacity="0.85"/>
      <text x="50" y="118" fill="#cbd5e1" font-size="11" text-anchor="middle">80세</text>
      <text x="50" y="132" fill="#ef4444" font-size="9" text-anchor="middle">420 mm²</text>
    </g>
  </g>

  <!-- Quantitative panel below -->
  <g transform="translate(40 280)">
    <text x="0" y="0" fill="#cbd5e1" font-size="12" font-weight="600">정량 지표 lifespan curve · 95% CI ellipse area (mm²)</text>

    <!-- mini line chart -->
    <line x1="0" y1="120" x2="720" y2="120" stroke="#334155"/>
    <line x1="0" y1="20" x2="0" y2="120" stroke="#334155"/>

    <g fill="#64748b" font-size="9" text-anchor="end">
      <text x="-6" y="124">0</text>
      <text x="-6" y="94">150</text>
      <text x="-6" y="64">300</text>
      <text x="-6" y="34">450</text>
    </g>

    <!-- Reference curve U-shape -->
    <path d="M 0 65 Q 80 90, 150 110 Q 220 115, 290 110 Q 360 100, 430 88 Q 500 70, 570 50 Q 640 30, 720 20"
          fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>

    <!-- Ribbon (25-75 percentile) -->
    <path d="M 0 55 Q 80 78, 150 100 Q 220 105, 290 100 Q 360 88, 430 75 Q 500 55, 570 35 Q 640 20, 720 10
             L 720 35 Q 640 50, 570 65 Q 500 85, 430 100 Q 360 110, 290 120 Q 220 120, 150 118 Q 80 100, 0 80 Z"
          fill="#3b82f6" fill-opacity="0.15"/>

    <!-- Cell points -->
    <circle cx="40" cy="65" r="4" fill="#3b82f6"/>
    <circle cx="130" cy="98" r="4" fill="#3b82f6"/>
    <circle cx="240" cy="113" r="4" fill="#10b981"/>
    <circle cx="370" cy="100" r="4" fill="#3b82f6"/>
    <circle cx="490" cy="78" r="4" fill="#fbbf24"/>
    <circle cx="580" cy="52" r="5" fill="#fbbf24" stroke="#0a0e1a" stroke-width="2"/>
    <circle cx="680" cy="32" r="4" fill="#ef4444"/>

    <!-- User marker -->
    <line x1="580" y1="52" x2="580" y2="120" stroke="#fbbf24" stroke-dasharray="2 2" opacity="0.5"/>

    <g fill="#64748b" font-size="9" text-anchor="middle">
      <text x="40" y="135">6</text>
      <text x="130" y="135">12</text>
      <text x="240" y="135">25</text>
      <text x="370" y="135">45</text>
      <text x="490" y="135">60</text>
      <text x="580" y="135" fill="#fbbf24" font-weight="600">72</text>
      <text x="680" y="135">80</text>
    </g>
    <text x="360" y="155" fill="#cbd5e1" font-size="11" text-anchor="middle">연령 (세)</text>
  </g>
</svg>
